<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaStream - Your Personal Netflix/Spotify/Audible</title>
    <style>
        body { font-family: Arial, sans-serif; background: #141414; color: #fff; margin: 0; }
        header { background: #000; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: #fff; margin: 0 15px; text-decoration: none; }
        .library { padding: 20px; }
        .section { margin-bottom: 40px; }
        .row { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; }
        .card { width: 200px; cursor: pointer; transition: transform 0.3s; }
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; border-radius: 4px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal-content { background: #222; padding: 20px; max-width: 80%; max-height: 90%; overflow: auto; }
        video, audio { width: 100%; max-height: 70vh; }
    </style>
</head>
<body>
    <header>
        <h1>MediaStream</h1>
        <nav>
            <a href="#" onclick="switchLibrary('all')">Home</a>
            <a href="#" onclick="switchLibrary('movies')">Movies</a>
            <a href="#" onclick="switchLibrary('tv')">TV Shows</a>
            <a href="#" onclick="switchLibrary('music')">Music</a>
            <a href="#" onclick="switchLibrary('podcasts')">Podcasts</a>
            <a href="#" onclick="switchLibrary('audiobooks')">Audiobooks</a>
        </nav>
        <input type="text" id="search" placeholder="Search media..." onkeyup="searchMedia()">
    </header>

    <div class="library" id="main-content">
        <!-- Populated by JS -->
    </div>

    <div id="player-modal" class="modal">
        <div class="modal-content">
            <span onclick="closePlayer()" style="float:right; cursor:pointer; font-size:24px;">&times;</span>
            <div id="player-container"></div>
            <h2 id="player-title"></h2>
        </div>
    </div>

    <script>
        let allMedia = {};

        async function loadLibraries() {
            try {
                const res = await fetch('/api/libraries');
                allMedia = await res.json();
                renderHome();
            } catch (e) {
                console.error(e);
                document.getElementById('main-content').innerHTML = '<p>Error loading libraries. Check server and paths.</p>';
            }
        }

        function renderHome() {
            let html = '<h2>Continue Watching</h2><div class="row" id="continue"></div>';
            for (const [lib, items] of Object.entries(allMedia)) {
                html += `<div class="section"><h2>${lib.toUpperCase()}</h2><div class="row" id="${lib}-row"></div></div>`;
            }
            document.getElementById('main-content').innerHTML = html;
            
            for (const [lib, items] of Object.entries(allMedia)) {
                const row = document.getElementById(`${lib}-row`) || document.createElement('div');
                if (!row.id) continue;
                row.innerHTML = items.slice(0, 10).map(item => `
                    <div class="card" onclick="playMedia('${item.path}', '${item.type}', '${item.metadata.title}')">
                        <img src="https://picsum.photos/id/${Math.floor(Math.random()*100)}/200/300" alt="${item.metadata.title}">
                        <p>${item.metadata.title}</p>
                    </div>
                `).join('');
            }
        }

        function switchLibrary(lib) {
            if (lib === 'all') {
                renderHome();
                return;
            }
            const items = allMedia[lib] || [];
            let html = `<h2>${lib.toUpperCase()}</h2><div class="row">`;
            html += items.map(item => `
                <div class="card" onclick="playMedia('${item.path}', '${item.type}', '${item.metadata.title}')">
                    <img src="https://picsum.photos/id/${Math.floor(Math.random()*100)}/200/300" alt="${item.metadata.title}">
                    <p>${item.metadata.title}</p>
                </div>
            `).join('');
            html += '</div>';
            document.getElementById('main-content').innerHTML = html;
        }

        function playMedia(filePath, type, title) {
            const modal = document.getElementById('player-modal');
            const container = document.getElementById('player-container');
            document.getElementById('player-title').textContent = title;
            
            let playerHTML = '';
            if (['movies', 'tv'].includes(type)) {
                playerHTML = `<video controls autoplay><source src="/stream?file=${encodeURIComponent(filePath)}" type="video/mp4"></video>`;
            } else {
                playerHTML = `<audio controls autoplay><source src="/stream?file=${encodeURIComponent(filePath)}" type="audio/mpeg"></audio>`;
            }
            container.innerHTML = playerHTML;
            modal.style.display = 'flex';
        }

        function closePlayer() {
            document.getElementById('player-modal').style.display = 'none';
        }

        function searchMedia() {
            console.log('Search term:', document.getElementById('search').value);
        }

        window.onload = loadLibraries;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaStream</title>
    <style>
        body { font-family: Arial, sans-serif; background: #141414; color: #fff; margin: 0; }
        header { background: #000; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .library { padding: 20px; }
        .section { margin-bottom: 40px; }
        .row { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; }
        .card { width: 200px; cursor: pointer; transition: transform 0.3s; }
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; border-radius: 4px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #222; padding: 20px; max-width: 90%; max-height: 90%; overflow: auto; border-radius: 8px; }
    </style>
</head>
<body>
    <header>
        <h1>MediaStream</h1>
        <nav>
            <a href="#" onclick="showConfig()">⚙️ Configure Libraries</a>
            <a href="#" onclick="switchLibrary('all')">Home</a>
        </nav>
    </header>

    <div id="config-modal" class="modal">
        <div class="modal-content">
            <h2>Library Paths</h2>
            <div id="config-form"></div>
            <button onclick="saveConfig()">Save & Scan</button>
            <button onclick="closeConfig()">Close</button>
        </div>
    </div>

    <div class="library" id="main-content"></div>

    <div id="player-modal" class="modal">
        <div class="modal-content">
            <span onclick="closePlayer()" style="float:right;cursor:pointer;font-size:28px;">&times;</span>
            <div id="player-container"></div>
            <h2 id="player-title"></h2>
        </div>
    </div>

    <script>
        let config = {
          movies: '/path/to/movies',
          tv: '/path/to/tv',
          music: '/path/to/music',
          podcasts: '/path/to/podcasts',
          audiobooks: '/path/to/audiobooks'
        };

        async function loadConfig() {
          // In real app, load from server. For now use localStorage or default
          const saved = localStorage.getItem('mediaConfig');
          if (saved) config = JSON.parse(saved);
        }

        function showConfig() {
          let html = '';
          Object.keys(config).forEach(key => {
            html += `<label>${key}: <input id="${key}" value="${config[key]}" style="width:80%;"></label><br><br>`;
          });
          document.getElementById('config-form').innerHTML = html;
          document.getElementById('config-modal').style.display = 'flex';
        }

        async function saveConfig() {
          Object.keys(config).forEach(key => {
            config[key] = document.getElementById(key).value;
          });
          localStorage.setItem('mediaConfig', JSON.stringify(config));
          closeConfig();
          loadLibraries();
        }

        function closeConfig() {
          document.getElementById('config-modal').style.display = 'none';
        }

        async function loadLibraries() {
          try {
            const res = await fetch('/api/libraries', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify(config)
            });
            const data = await res.json();
            renderLibraries(data);
          } catch(e) {
            document.getElementById('main-content').innerHTML = '<p>Update paths in config and scan again.</p>';
          }
        }

        function renderLibraries(data) {
          let html = '<h2>Your Libraries</h2>';
          for (const [lib, items] of Object.entries(data)) {
            html += `<div class="section"><h3>${lib.toUpperCase()} (${items.length} items)</h3><div class="row">`;
            html += items.slice(0,8).map(item => `
              <div class="card" onclick="playMedia('${item.path}', '${item.type}', '${item.metadata.title}')">
                <img src="https://picsum.photos/id/${Math.floor(Math.random()*200)}/200/280" >
                <p>${item.metadata.title}</p>
              </div>`).join('');
            html += '</div></div>';
          }
          document.getElementById('main-content').innerHTML = html;
        }

        function playMedia(...) { /* same as before */ }
        // (full player code abbreviated for brevity)

        window.onload = () => { loadConfig(); loadLibraries(); };
    </script>
</body>
</html>
